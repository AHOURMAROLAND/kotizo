services:
  kotizo_redis:
    image: redis:7-alpine
    container_name: kotizo_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - kotizo_redis_data:/data

  kotizo_evolution:
    image: atendai/evolution-api:latest
    container_name: kotizo_evolution
    ports:
      - "8080:8080"
    environment:
      - EVOLUTION_API_KEY=kotizo-evolution-key-2026
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/api/whatsapp/webhook/
      - WEBHOOK_GLOBAL_ENABLED=true
      - DEL_INSTANCE=false
    restart: unless-stopped
    volumes:
      - kotizo_evolution_data:/evolution/instances

volumes:
  kotizo_redis_data:
  kotizo_evolution_data:
